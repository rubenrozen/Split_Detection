name: Split Detector

on:
  schedule:
    - cron: '0 6 * * *'   # 06h00 UTC = 01h00 heure Panama (UTC-5)
  workflow_dispatch:        # Déclenchement manuel possible

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run split detector
        env:
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
          POLYGON_API_KEY:     ${{ secrets.POLYGON_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          PORTFOLIO:           ${{ secrets.PORTFOLIO }}
          NEXT_HORIZON:        ${{ secrets.NEXT_HORIZON }}
          TREND_SPOTTING:      ${{ secrets.TREND_SPOTTING }}
          VALUE_UNDERFLOW:     ${{ secrets.VALUE_UNDERFLOW }}
        run: python split_detector.py
